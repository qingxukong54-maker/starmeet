<svg xmlns='http://www.w3.org/2000/svg' width='104' height='104' viewBox='0 0 104 104'>
  <!-- 圆形渐变背景，匹配快捷入口 -->
  <defs>
    <linearGradient id='bg' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#ff9aeb;stop-opacity:1' />
      <stop offset='100%' style='stop-color:#ff6b9d;stop-opacity:1' />
    </linearGradient>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='3' stdDeviation='5' flood-color='rgba(0,0,0,0.08)'/>
    </filter>
  </defs>
  <circle cx='52' cy='52' r='50' fill='url(#bg)' filter='url(#shadow)'/>
  
  <g transform='translate(52,52)' fill='#fff'>
    <rect x='-20' y='-22' width='40' height='36' rx='5'/>
    <rect x='-20' y='-22' width='40' height='12' rx='5'/>
    <rect x='-20' y='-14' width='40' height='4'/>
    <line x1='-14' y1='-28' x2='-14' y2='-16' stroke='#ff6b9d' stroke-width='3' stroke-linecap='round'/>
    <line x1='14' y1='-28' x2='14' y2='-16' stroke='#ff6b9d' stroke-width='3' stroke-linecap='round'/>
    <rect x='-12' y='8' width='8' height='7' rx='1' fill='#ff9aeb' opacity='0.8'/>
    <rect x='2' y='8' width='8' height='7' rx='1' fill='#ff9aeb' opacity='0.8'/>
    <rect x='-12' y='18' width='8' height='7' rx='1' fill='#ff9aeb' opacity='0.8'/>
  </g>
</svg>