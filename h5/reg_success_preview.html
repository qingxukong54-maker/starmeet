<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>注册成功页预览</title>
  <style>
    /* 基础重置 */
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", "Microsoft YaHei", sans-serif;
      background:#e9e7ec;
      color:#333333;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    img { display: block; max-width: 100%; border-radius: 8px; }
    button { border: none; outline: none; cursor: pointer; font-family: inherit; }

    /* 预览框架 */
    .preview-frame {
      max-width: 420px; margin: 0 auto; background: #fff;
      min-height: 100vh; box-shadow: 0 0 40px rgba(0,0,0,.12);
    }
    .preview-tip {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 420px; z-index: 999;
      background: rgba(255,107,157,.92); color: #fff; text-align: center;
      font-size: 12px; padding: 6px 0; letter-spacing: .5px;
    }

    /* 注册成功页真实样式（来自 style.css） */
    .page { display: none; animation: fadeIn 0.3s ease-out; }
    .page.active { display: block; }
    .page.active.reg-success-page { display: flex !important; }
    .reg-success-page {
      background: #fff !important; min-height: 100vh;
      display: flex !important; flex-direction: column !important;
      align-items: center !important;
      padding: 0 !important; text-align: center !important;
      position: relative; box-sizing: border-box;
    }
    .rsp-container {
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 24px 40px; box-sizing: border-box;
    }
    .rsp-check-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, #52c41a, #389e0d);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 6px 18px rgba(82, 196, 26, 0.28);
    }
    .rsp-check-icon svg { display: block; }
    .rsp-title { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    .rsp-subtitle { font-size: 14px; color: #888; margin-bottom: 22px; line-height: 1.5; }
    .rsp-cs-card {
      width: 170px; height: 170px; border-radius: 16px;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px; box-shadow: 0 2px 16px rgba(0,0,0,.08);
      border: 1px solid #eee;
    }
    .rsp-qrcode { width: 148px; height: 148px; border-radius: 12px; }
    .rsp-cs-btn {
      display: flex; align-items: center; width: 100%;
      padding: 14px 20px; margin-bottom: 10px;
      background: #fff; border: 1.5px solid #e8e8e8; border-radius: 14px;
      font-size: 15px; color: #333; cursor: pointer;
      transition: border-color .2s, box-shadow .2s;
      box-shadow: 0 1px 6px rgba(0,0,0,.05);
    }
    .rsp-cs-btn:active { border-color: #ff6b9d; box-shadow: 0 2px 10px rgba(255,107,157,.15); }
    .rsp-cs-btn svg { flex: 0 0 auto; }
    .rsp-cs-btn span { margin: 0 8px; }
    .rsp-cs-btn .copy-icon { margin-left: auto; }
    .rsp-qrcode-hint { font-size: 12.5px; color: #aaa; margin-bottom: 28px; line-height: 1.6; }
    .rsp-enter-btn {
      display: block; width: 100%; padding: 15px;
      border-radius: 26px; border: none;
      background: linear-gradient(135deg, #ff7eb3, #ff6b9d);
      color: #fff; font-size: 17px; font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 16px rgba(255,107,157,.35);
      letter-spacing: 2px; transition: transform .15s;
    }
    .rsp-enter-btn:active { transform: scale(.97); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="preview-tip">注册成功页预览（已内联真实样式，无需联网）</div>
  <div class="preview-frame">
    <div id="content">
      <!-- 以下结构由 h5/app.js 的 _renderRegSuccess() 渲染 -->
      <div class="page active reg-success-page">
        <div class="rsp-container">
          <div class="rsp-check-icon">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
          <div class="rsp-title">恭喜您，注册成功！</div>
          <div class="rsp-subtitle">离脱单又近了一步，稍后客服将进行审核</div>

          <div class="rsp-cs-card">
            <img class="rsp-qrcode" src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=starmeet_vip" alt="客服微信二维码">
          </div>

          <button class="rsp-cs-btn" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#07c160"><path d="M8.5 13.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zm7 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z"/><path d="M17.5 2c-2.7 0-5.1 1.4-6.5 3.5C9.6 3.4 7.2 2 4.5 2 2 2 0 3.9 0 6.3c0 1.5.8 2.8 2 3.7v.1l.5.3c-.1.6-.4 1.7-1 2.6 1.1.2 2.5-.1 3.5-.9l.3-.2c.7.2 1.4.3 2.2.3.2 0 .3 0 .5-.1-.1.6-.2 1.3-.2 2 0 4.2 3.6 7.7 8 7.7s8-3.5 8-7.7c0-.7-.1-1.4-.2-2 .2 0 .3.1.5.1.8 0 1.5-.1 2.2-.3l.3.2c1 .8 2.4 1.1 3.5.9-.6-.9-.9-2-1-2.6l.5-.3v-.1c1.2-.9 2-2.2 2-3.7C24 3.9 22 2 17.5 2z"/></svg>
            <span>客服微信号：starmeet_vip</span>
            <svg class="copy-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          </button>

          <div class="rsp-qrcode-hint">扫描二维码或复制客服微信号添加客服</div>

          <button class="rsp-enter-btn" type="button">先去看看</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
