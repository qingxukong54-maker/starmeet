<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SM婚恋系统 - 管理后台</title>
  <link rel="stylesheet" href="/admin/admin.css">
  <!-- ====== 问卷模块样式补充（可选，如需覆盖可在此添加）====== -->
  <style>
    /* 问卷模块专用样式 - 与现有 admin.css 风格保持一致 */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid #f0f0f0;
    }
    .page-header h3 { margin: 0; font-size: 18px; color: #333; }

    /* 数据表格 */
    .data-table-wrapper { overflow-x: auto; border-radius: 8px; border: 1px solid #e8e8e8; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table thead { background: #fafafa; }
    .data-table th { padding: 10px 14px; text-align: left; font-weight: 600; color: #555; border-bottom: 1px solid #eee; white-space: nowrap; }
    .data-table td { padding: 10px 14px; border-bottom: 1px solid #f5f5f5; color: #444; }
    .data-table tr:hover { background: #f9fbff; }

    /* Toast */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: #fff; padding: 10px 24px;
      border-radius: 6px; z-index: 99999; display: none; font-size: 14px;
      transition: opacity 0.3s;
    }
    .toast.show { display: block; opacity: 1; }

    /* 拖拽时样式 */
    .question-item[draggable="true"]:hover { background: #f0f7ff !important; }
    .question-item { transition: background 0.15s ease; }

    /* 模态弹窗复用 */
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 10000; display: flex; align-items: center; justify-content: center; }
    .modal-mask { position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
    .modal-card { position: relative; background: #fff; border-radius: 12px; padding: 24px; max-width: 90vw; max-height: 85vh; overflow-y: auto; z-index: 1; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #333; }
    .modal-close { position: absolute; top: 10px; right: 14px; font-size: 22px; cursor: pointer; color: #999; line-height: 1; }
    .modal-close:hover { color: #e74c3c; }
  </style>
</head>
<body>
  <!-- 登录页 -->
  <div id="loginPage" class="login-page">
    <div class="login-card">
      <h1>💕 SM婚恋系统</h1>
      <p class="subtitle">管理后台 · 婚恋平台运营中心</p>
      <div class="form-group"><label>账号</label><input id="loginUser" value="admin"></div>
      <div class="form-group"><label>密码</label><input id="loginPwd" type="password" value="admin888"></div>
      <button class="primary-btn" onclick="Admin.login()">登录</button>
      <div class="login-tip">默认账号：admin / admin888</div>
    </div>
  </div>

  <!-- 后台主页 -->
  <div id="adminPage" style="display:none">
    <aside class="sidebar">
      <div class="logo">💕 SM婚恋系统</div>
      <nav>
        <a class="menu-item active" data-page="dashboard"><i>📊</i>数据看板</a>
        <a class="menu-item" data-page="users"><i>👥</i>会员管理</a>
        <a class="menu-item" data-page="star"><i>⭐</i>今日之星</a>
        <a class="menu-item" data-page="banners"><i>🎠</i>首页轮播</a>
        <a class="menu-item" data-page="quickEntries"><i>🧭</i>快捷入口</a>
        <a class="menu-item" data-page="siteConfig"><i>🏷️</i>站点配置</a>
        <a class="menu-item" data-page="contact"><i>📞</i>联系我们</a>
        <a class="menu-item" data-page="vip"><i>👑</i>VIP等级</a>
        <a class="menu-item" data-page="agreements"><i>📄</i>协议管理</a>
        <a class="menu-item" data-page="articles"><i>📚</i>婚恋学堂</a>
        <a class="menu-item" data-page="activities"><i>🎉</i>活动管理</a>
        <a class="menu-item" data-page="messages"><i>💬</i>消息记录</a>
        <a class="menu-item" data-page="broadcast"><i>📣</i>群发消息</a>

        <!-- ====== 🆕 问卷管理菜单（新增）====== -->
        <a class="menu-item" data-page="surveyList" style="background:linear-gradient(135deg,#667eea15,#764ba215); border-left:3px solid #667eea;"><i>📋</i><strong>问卷管理</strong></a>

        <a class="menu-item" data-page="settings"><i>⚙️</i>系统设置</a>
        <a class="menu-item" data-page="mailConfig"><i>📧</i>邮箱配置</a>
      </nav>
      <div class="sidebar-footer">
        <div class="admin-info">🛡️ <span id="adminName">admin</span></div>
        <a onclick="Admin.logout()">退出登录</a>
        <a href="/" target="_blank" style="color:#4cd964;">→ 查看H5前端</a>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <h2 id="pageTitle">数据看板</h2>
        <div class="topbar-right"><span id="currentTime"></span></div>
      </header>
      <div id="pageContent" class="page-content"></div>
    </main>
  </div>

  <!-- 编辑会员弹窗 -->
  <div id="userEditModal" class="modal" style="display:none">
    <div class="modal-mask" onclick="Admin.closeEditUser()"></div>
    <div class="modal-card" style="max-width: 520px;">
      <div class="modal-title">编辑会员</div>
      <div id="userEditForm"></div>
      <div style="display:flex; gap:8px; margin-top: 12px;">
        <button class="primary-btn" onclick="Admin.saveUser()">保存</button>
        <button class="primary-btn" style="background:#f5f5f5;color:#666;" onclick="Admin.closeEditUser()">取消</button>
      </div>
      <div class="modal-close" onclick="Admin.closeEditUser()">×</div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- 用户关系弹窗 -->
  <div id="relationsModal" class="modal" style="display:none;">
    <div class="modal-mask" onclick="Admin.closeRelations()"></div>
    <div class="modal-card" style="max-width:600px;">
      <div class="modal-title" id="relationsTitle">用户关系</div>
      <div class="modal-close" onclick="Admin.closeRelations()">×</div>
      <div id="relationsContent" style="padding:16px 0;">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </div>

  <!-- 原有 admin.js -->
  <script src="/admin/admin.js?v=20260630"></script>
  
  <!-- ====== 🆕 问卷管理模块JS（新增）====== -->
  <script src="/admin/admin.survey.js?v=20260701"></script>

  <!-- ====== 菜单路由扩展：让问卷页面能正常切换 ====== -->
  <script>
    // 在现有 Admin 菜单点击逻辑基础上扩展
    // 如果原有 admin.js 使用了事件委托处理 menu-item 点击，
    // 则 surveyList / surveyEdit / surveyResults 会自动被识别为新页面
    
    // 扩展页面标题映射
    (function() {
      const pageTitleMap = {
        'surveyList': '📋 问卷管理',
        'surveyEdit': '✏️ 编辑问卷',
        'surveyResults': '📊 数据统计'
      };

      // 监听菜单点击，更新标题 + 渲染对应内容
      document.addEventListener('click', function(e) {
        const menuItem = e.target.closest('.menu-item');
        if (!menuItem) return;

        const page = menuItem.dataset.page;
        if (pageTitleMap[page]) {
          const titleEl = document.getElementById('pageTitle');
          if (titleEl) titleEl.textContent = pageTitleMap[page];
          
          // 渲染问卷页面
          setTimeout(function() {
            if (typeof SurveyAdmin !== 'undefined') {
              switch(page) {
                case 'surveyList':
                  SurveyAdmin.renderSurveyList();
                  break;
                case 'surveyEdit':
                case 'surveyResults':
                  // 这两个通常从列表页进入
                  break;
              }
            }
          }, 50);
        }
      });
      
      console.log('[SM婚恋系统] 问卷管理模块已集成 ✅');
    })();
  </script>
</body>
</html>
