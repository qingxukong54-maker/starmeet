<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SM婚恋系统 V1.0 - 管理后台</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
  <!-- 登录页 -->
  <div id="loginPage" class="login-page">
    <div class="login-card">
      <h1>💕 SM婚恋系统 V1.0</h1>
      <p class="subtitle">管理后台 · 婚恋平台运营中心</p>
      <div class="form-group"><label>账号</label><input id="loginUser" value="admin"></div>
      <div class="form-group"><label>密码</label><input id="loginPwd" type="password" value="admin888"></div>
      <button class="primary-btn" onclick="Admin.login()">登录</button>
      <div class="login-tip">默认账号：admin / admin888</div>
    </div>
  </div>

  <!-- 后台主页 -->
  <div id="adminPage" style="display:none">
    <aside class="sidebar">
      <div class="logo">💕 SM婚恋系统 V1.0</div>
      <nav>
        <a class="menu-item active" data-page="dashboard"><i>📊</i>数据看板</a>
        <a class="menu-item" data-page="users"><i>👥</i>会员管理</a>
        <a class="menu-item" data-page="star"><i>⭐</i>今日之星</a>
        <a class="menu-item" data-page="banners"><i>🎠</i>首页轮播</a>
        <a class="menu-item" data-page="quickEntries"><i>🧭</i>快捷入口</a>
        <a class="menu-item" data-page="siteConfig"><i>🏷️</i>站点配置</a>
        <a class="menu-item" data-page="contact"><i>📞</i>联系我们</a>
        <a class="menu-item" data-page="vip"><i>👑</i>VIP等级</a>
        <a class="menu-item" data-page="agreements"><i>📄</i>协议管理</a>
        <a class="menu-item" data-page="articles"><i>📚</i>婚恋学堂</a>
        <a class="menu-item" data-page="activities"><i>🎉</i>活动管理</a>
        <a class="menu-item" data-page="messages"><i>💬</i>消息记录</a>
        <a class="menu-item" data-page="broadcast"><i>📣</i>群发消息</a>
        <a class="menu-item" data-page="settings"><i>⚙️</i>系统设置</a>
        <a class="menu-item" data-page="mailConfig"><i>📧</i>邮箱配置</a>
      </nav>
      <div class="sidebar-footer">
        <div class="admin-info">🛡️ <span id="adminName">admin</span></div>
        <a onclick="Admin.logout()">退出登录</a>
        <a href="/" target="_blank" style="color:#4cd964;">→ 查看H5前端</a>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <h2 id="pageTitle">数据看板</h2>
        <div class="topbar-right"><span id="currentTime"></span></div>
      </header>
      <div id="pageContent" class="page-content"></div>
    </main>
  </div>

  <!-- 编辑会员弹窗 -->
  <div id="userEditModal" class="modal" style="display:none">
    <div class="modal-mask" onclick="Admin.closeEditUser()"></div>
    <div class="modal-card" style="max-width: 520px;">
      <div class="modal-title">编辑会员</div>
      <div id="userEditForm"></div>
      <div style="display:flex; gap:8px; margin-top: 12px;">
        <button class="primary-btn" onclick="Admin.saveUser()">保存</button>
        <button class="primary-btn" style="background:#f5f5f5;color:#666;" onclick="Admin.closeEditUser()">取消</button>
      </div>
      <div class="modal-close" onclick="Admin.closeEditUser()">×</div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- 用户关系弹窗 -->
  <div id="relationsModal" class="modal" style="display:none;">
    <div class="modal-mask" onclick="Admin.closeRelations()"></div>
    <div class="modal-card" style="max-width:600px;">
      <div class="modal-title" id="relationsTitle">用户关系</div>
      <div class="modal-close" onclick="Admin.closeRelations()">×</div>
      <div id="relationsContent" style="padding:16px 0;">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </div>

  <script src="/admin/admin.js?v=20260630"></script>
</body>
</html>
