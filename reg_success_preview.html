<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>注册成功页预览</title>
  <link rel="stylesheet" href="http://localhost:713/style.css?v=38">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { margin: 0; background: #e9e7ec; }
    /* 手机壳预览 */
    .preview-frame {
      max-width: 420px; margin: 0 auto; background: #fff;
      min-height: 100vh; box-shadow: 0 0 40px rgba(0,0,0,.12);
    }
    /* 顶部提示条（仅预览用） */
    .preview-tip {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 420px; z-index: 999;
      background: rgba(255,107,157,.92); color: #fff; text-align: center;
      font-size: 12px; padding: 5px 0; letter-spacing: .5px;
    }
  </style>
</head>
<body>
  <div class="preview-tip">📱 注册成功页预览（真实样式 · 引用本地 713 style.css）</div>
  <div class="preview-frame">
    <div id="content">
      <!-- 以下结构由 h5/app.js 的 _renderRegSuccess() 渲染 -->
      <div class="page active reg-success-page">
        <div class="rsp-container">
          <div class="rsp-check-icon"><i class="fas fa-check"></i></div>
          <div class="rsp-title">恭喜您，注册成功！</div>
          <div class="rsp-subtitle">离脱单又近了一步，稍后客服将进行审核</div>

          <div class="rsp-cs-card">
            <img class="rsp-qrcode" src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=starmeet_vip" alt="客服微信二维码">
          </div>

          <button class="rsp-cs-btn" type="button">
            <i class="fab fa-weixin" style="color:#07c160;font-size:18px;margin-right:6px;"></i>
            <span>客服微信号：starmeet_vip</span>
            <i class="far fa-copy" style="margin-left:auto;color:#999;font-size:15px;"></i>
          </button>

          <div class="rsp-qrcode-hint">扫描二维码或复制客服微信号添加客服</div>

          <button class="rsp-enter-btn" type="button">先去看看</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
